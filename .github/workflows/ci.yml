# The green gate, enforced on both grounds Loam must grow in: linux and windows.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: green-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The trust-root gate suite (test/scripts/rails-guard-ci.test.ts) drives the REAL adlc CLI
      # against fixture repositories, and it FAILS CLOSED on CI when the CLI is missing — a runner
      # that lost its provisioning must not report the gate suite green having run none of it. So
      # the test job provisions what the suite refuses to fake.
      - run: npm i -g @adlc/cli
      - name: format + lint + typecheck + tests
        run: npm run check

  # The rail backstop. ADLC's in-session PreToolUse hook cannot gate Bash — a shell can't be reliably
  # parsed — so a rail edited through a shell command is caught here or nowhere. Linux only: the two
  # Windows patches this repo carries are for `adlc review` and `adlc init`, neither of which runs
  # in this job.
  rails:
    name: rails-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the gate diffs against the base ref; a shallow clone has no base
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm i -g @adlc/cli
      - name: no frozen rail was edited
        run: |
          BASE="origin/${{ github.base_ref || github.event.repository.default_branch }}"
          git fetch --quiet origin "${{ github.base_ref || github.event.repository.default_branch }}"
          node scripts/rails-guard-ci.mjs "$BASE"

# The green gate, enforced on both grounds Loam must grow in: linux and windows.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: green-gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: format + lint + typecheck + tests
        run: npm run check

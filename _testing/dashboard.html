<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>The Village Almanac</title>
    <style>
      :root {
        --bg: #14171a;
        --panel: #1c2126;
        --ink: #d8d5c9;
        --dim: #8a8778;
        --moss: #7fa66a;
        --honey: #d9a441;
        --reel: #8ea6c8;
        --alarm: #c86d5a;
        --edge: #2c343b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font:
          15px/1.5 "Iosevka",
          "Cascadia Code",
          Consolas,
          monospace;
      }
      header {
        padding: 18px 26px 10px;
        border-bottom: 1px solid var(--edge);
        display: flex;
        align-items: baseline;
        gap: 14px;
      }
      header h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      header .sub {
        color: var(--dim);
        font-size: 12.5px;
      }
      #pulse {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #3a4753;
        align-self: center;
        transition: background 0.15s;
      }
      #pulse.beat {
        background: var(--moss);
      }
      main {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 0;
        min-height: calc(100vh - 58px);
      }
      #cards {
        padding: 20px 26px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        align-content: start;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 14px 16px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .card.flash {
        border-color: var(--moss);
        box-shadow: 0 0 14px rgba(127, 166, 106, 0.25);
      }
      .card h2 {
        margin: 0 0 2px;
        font-size: 16px;
      }
      .card .bio {
        color: var(--ink);
        min-height: 3em;
        margin: 4px 0 8px;
        font-style: italic;
      }
      .card .bio.duel {
        color: var(--alarm);
      }
      .card .trust {
        font-style: normal;
        color: var(--moss);
        font-size: 13px;
        border-left: 3px solid var(--moss);
        padding-left: 8px;
        margin-top: 4px;
      }
      .row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin: 3px 0;
        font-size: 12.5px;
      }
      .row .k {
        color: var(--dim);
        min-width: 92px;
      }
      .chip {
        background: #232a31;
        border: 1px solid var(--edge);
        border-radius: 10px;
        padding: 0 8px;
        font-size: 11.5px;
        color: var(--ink);
      }
      .chip.reel {
        color: var(--reel);
      }
      .chip.hive {
        color: var(--honey);
      }
      .hex {
        color: var(--dim);
        font-size: 10.5px;
        margin-top: 8px;
        word-break: break-all;
      }
      .changed {
        color: var(--moss);
        font-size: 11px;
        height: 14px;
      }
      #log {
        border-left: 1px solid var(--edge);
        padding: 16px 18px;
        overflow-y: auto;
        max-height: calc(100vh - 58px);
        font-size: 12.8px;
      }
      #log h3 {
        margin: 0 0 10px;
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.14em;
      }
      .entry {
        padding: 4px 0;
        border-bottom: 1px dotted #242c33;
      }
      .entry time {
        color: var(--dim);
        font-size: 10.5px;
        margin-right: 8px;
      }
      .entry.write {
        color: var(--ink);
      }
      .entry.patch {
        color: var(--moss);
      }
      .entry.forgery {
        color: var(--alarm);
      }
      @media (max-width: 980px) {
        main {
          grid-template-columns: 1fr;
        }
        #cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>The Village Almanac</h1>
      <div id="pulse" title="the federation pulse"></div>
      <div class="sub">
        four stores · one confluence · nothing is deleted, the ground only learns
      </div>
    </header>
    <main>
      <div id="cards"></div>
      <aside id="log">
        <h3>THE DAY'S EVENTS</h3>
        <div id="entries"></div>
      </aside>
    </main>
    <script>
      const PEOPLE = ["person:wren", "person:miles", "person:odile", "person:petra"];
      const cards = document.getElementById("cards");
      const entries = document.getElementById("entries");
      const state = {};

      for (const p of PEOPLE) {
        const el = document.createElement("div");
        el.className = "card";
        el.id = p.replace(":", "-");
        el.innerHTML = `
    <h2>—</h2>
    <div class="bio">…</div>
    <div class="row"><span class="k">follows</span><span class="v follows"></span></div>
    <div class="row"><span class="k">screenings</span><span class="v companioned"></span></div>
    <div class="row"><span class="k">gatherings</span><span class="v attended"></span></div>
    <div class="changed"></div>
    <div class="hex"></div>`;
        cards.appendChild(el);
      }

      // The canonical hex's head and tail are shared structure (same prop names, same tenant), so a
      // short display fingerprint hashes the WHOLE string — any changed byte anywhere shows.
      function fingerprint(hex) {
        let h = 5381;
        for (let i = 0; i < hex.length; i++) h = ((h * 33) ^ hex.charCodeAt(i)) >>> 0;
        return h.toString(36).padStart(7, "0") + "·" + hex.length / 2 + "b";
      }

      function chips(el, list, cls) {
        el.innerHTML = "";
        for (const item of [...new Set(list ?? [])]) {
          const c = document.createElement("span");
          c.className = "chip" + (cls ? " " + cls : "");
          c.textContent = String(item).replace(/^(screening|gathering|person):/, "");
          el.appendChild(c);
        }
        if (el.innerHTML === "")
          el.innerHTML = '<span class="chip" style="color:#555">none yet</span>';
      }

      function renderDossier(person, d) {
        const el = document.getElementById(person.replace(":", "-"));
        if (!el) return;
        el.querySelector("h2").textContent = d.name ?? person;
        state[person] = Object.assign(state[person] ?? {}, d);
        renderBio(person);
        chips(el.querySelector(".follows"), d.follows);
        chips(el.querySelector(".companioned"), d.companioned, "reel");
        chips(el.querySelector(".attended"), d.attended, "hive");
        el.querySelector(".hex").textContent = d._hex ? "view " + fingerprint(d._hex) : "";
        const ch = el.querySelector(".changed");
        ch.textContent = d._changed ? "Δ " + d._changed.join(", ") : "";
        el.classList.remove("flash");
        void el.offsetWidth;
        el.classList.add("flash");
        setTimeout(() => el.classList.remove("flash"), 900);
        if (d._changed) log("patch", `${d.name ?? person} · ${d._changed.join(", ")} moved`);
      }

      function renderBio(person) {
        const s = state[person] ?? {};
        const el = document.getElementById(person.replace(":", "-"));
        const bio = el.querySelector(".bio");
        const duel = s.trusted !== undefined && s.trusted !== s.bio;
        const erased = s.guarded !== undefined && s.guarded !== s.bio && s.guarded !== s.trusted;
        if (duel || erased) {
          bio.classList.add("duel");
          let lines = `“${s.bio ?? "…"}”`;
          if (duel) lines += `<div class="trust">but those who know her say: “${s.trusted}”</div>`;
          if (erased)
            lines += `<div class="trust">and the guarded record holds: “${s.guarded}”</div>`;
          bio.innerHTML = lines;
        } else {
          bio.classList.remove("duel");
          bio.textContent = s.bio ? `“${s.bio}”` : "…";
        }
      }

      function log(kind, text) {
        const e = document.createElement("div");
        e.className = "entry " + kind;
        const t = new Date().toLocaleTimeString();
        e.innerHTML = `<time>${t}</time>${text}`;
        entries.prepend(e);
        while (entries.childElementCount > 120) entries.lastChild.remove();
      }

      const es = new EventSource("/events");
      es.onmessage = (msg) => {
        const ev = JSON.parse(msg.data);
        if (ev.kind === "dossier") renderDossier(ev.person, ev.data);
        else if (ev.kind === "event") log(ev.tone ?? "write", ev.text);
        else if (ev.kind === "trust") {
          state["person:wren"] = Object.assign(state["person:wren"] ?? {}, {
            trusted: ev.trusted,
            guarded: ev.guarded,
            bio: ev.plain,
          });
          renderBio("person:wren");
        } else if (ev.kind === "pulse") {
          const dot = document.getElementById("pulse");
          dot.classList.add("beat");
          setTimeout(() => dot.classList.remove("beat"), 250);
        }
      };
      es.onerror = () => log("forgery", "the almanac went quiet — is the village still up?");
    </script>
  </body>
</html>

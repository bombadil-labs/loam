<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Village</title>
    <style>
      :root {
        --grass: #6f8f5a;
        --grass2: #789a61;
        --ink: #2b2318;
        --panel: #f4ecd8;
        --edge: #cdbf9a;
        --moss: #4f7a3a;
        --stone: #b9b0a0;
        --barn: #a4503f;
        --hive: #d8a638;
        --alien: #3f8f8a;
        --alarm: #b4472e;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #223018;
        color: var(--ink);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      #wrap {
        display: grid;
        grid-template-columns: 1fr 320px;
        grid-template-rows: 46px 1fr;
        height: 100vh;
      }
      header {
        grid-column: 1 / 3;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 18px;
        background: #1b2712;
        color: #ecdfbb;
        border-bottom: 1px solid #35492a;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 650;
        letter-spacing: 0.3px;
      }
      header .sub {
        font-size: 12px;
        color: #a9bd8e;
      }
      #pulse {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        color: #a9bd8e;
      }
      #pip {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: #5f7a45;
        transition: transform 0.15s, background 0.15s;
      }
      #pip.beat {
        background: #c6e29a;
        transform: scale(1.7);
      }
      #stage {
        display: block;
        width: 100%;
        height: 100%;
      }
      #stagewrap {
        position: relative;
        overflow: hidden;
        background: radial-gradient(120% 120% at 40% 30%, var(--grass2), var(--grass) 70%, #5f7d4c);
      }
      aside {
        background: #efe6cf;
        border-left: 1px solid var(--edge);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      aside h2 {
        margin: 0;
        padding: 10px 14px 6px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #8a7d5c;
      }
      #dossier {
        padding: 4px 14px 10px;
        border-bottom: 1px solid var(--edge);
        min-height: 168px;
      }
      #dossier .empty {
        color: #a99b78;
        font-style: italic;
        padding: 18px 2px;
      }
      #dossier h3 {
        margin: 2px 0 6px;
        font-size: 16px;
      }
      .bio {
        font-style: italic;
        margin: 3px 0;
      }
      .lens {
        font-size: 12.5px;
        border-left: 3px solid var(--moss);
        padding-left: 8px;
        margin: 4px 0;
        color: #3c5a2c;
      }
      .lens.alarm {
        border-color: var(--alarm);
        color: var(--alarm);
      }
      .row {
        margin: 5px 0 0;
      }
      .k {
        font-size: 11px;
        color: #8a7d5c;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .chip {
        display: inline-block;
        background: #e4d8b6;
        border: 1px solid var(--edge);
        border-radius: 10px;
        padding: 1px 8px;
        margin: 2px 3px 0 0;
        font-size: 12px;
      }
      .chip.reel {
        background: #eccdc6;
      }
      .chip.hive {
        background: #efe0b0;
      }
      .mill {
        color: #9a7b25;
        font-size: 12.5px;
        margin-top: 5px;
      }
      #log {
        flex: 1;
        overflow-y: auto;
        padding: 2px 12px 12px;
        font-size: 12.5px;
      }
      #log .e {
        padding: 3px 0;
        border-bottom: 1px dashed #e0d5b6;
      }
      #log .t {
        color: #a99b78;
        font-variant-numeric: tabular-nums;
        margin-right: 6px;
        font-size: 11px;
      }
      #log .e.forgery {
        color: var(--alarm);
      }
      #log .e.patch {
        color: var(--moss);
      }
      #hint {
        position: absolute;
        left: 12px;
        bottom: 10px;
        font-size: 11px;
        color: #223018;
        background: rgba(244, 236, 216, 0.72);
        padding: 3px 8px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <header>
        <h1>The Village</h1>
        <span class="sub">five sovereign stores · nothing deleted, the ground only learns</span>
        <div id="pulse"><span>federation</span><span id="pip"></span></div>
      </header>
      <div id="stagewrap">
        <canvas id="stage"></canvas>
        <div id="hint">click a villager to read their dossier · watch them tend the ground</div>
      </div>
      <aside>
        <h2>Dossier</h2>
        <div id="dossier"><div class="empty">no one selected — click a figure</div></div>
        <h2>The day's events</h2>
        <div id="log"></div>
      </aside>
    </div>
    <script>
      const cv = document.getElementById("stage");
      const ctx = cv.getContext("2d");
      const W = 1000,
        H = 620;
      function fit() {
        const r = cv.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        cv.width = r.width * dpr;
        cv.height = r.height * dpr;
        scale = Math.min(r.width / W, r.height / H);
        ox = (r.width - W * scale) / 2;
        oy = (r.height - H * scale) / 2;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      let scale = 1,
        ox = 0,
        oy = 0;

      // ---- the map --------------------------------------------------------------------------
      const PLACES = {
        reel: { x: 170, y: 150, label: "the reel", kind: "barn" },
        hive: { x: 815, y: 150, label: "the hive", kind: "hive" },
        commons: { x: 320, y: 400, label: "the commons", kind: "garden" },
        almanac: { x: 610, y: 360, label: "the almanac", kind: "hall" },
        cinelog: { x: 930, y: 430, label: "cinelog", kind: "hut" },
        gate: { x: 852, y: 300, label: "", kind: "gate" },
      };
      const CAST = {
        wren: { color: "#3f6d9a", home: "commons", ox: -34, oy: 8 },
        petra: { color: "#8a5aa6", home: "commons", ox: 40, oy: 28 },
        miles: { color: "#a4503f", home: "reel", ox: 6, oy: 40 },
        odile: { color: "#c69a2a", home: "hive", ox: 4, oy: 44 },
        sasha: { color: "#2f8f8a", home: "cinelog", ox: 6, oy: 30 },
        mallory: { color: "#555", home: "gate", ox: -66, oy: 6 },
      };
      const NAMES = {
        wren: "Wren",
        petra: "Petra",
        miles: "Miles",
        odile: "Odile",
        sasha: "Sasha",
        mallory: "Mallory",
      };
      const figures = {};
      for (const [id, c] of Object.entries(CAST)) {
        const p = PLACES[c.home];
        figures[id] = {
          id,
          color: c.color,
          x: p.x + c.ox,
          y: p.y + c.oy,
          hx: p.x + c.ox,
          hy: p.y + c.oy,
          tx: p.x + c.ox,
          ty: p.y + c.oy,
          phase: Math.random() * 6,
          bubble: null,
          bubbleUntil: 0,
          idleUntil: 0,
        };
      }

      let millSpin = 0,
        millActive = 0, // ms remaining that the wheel turns
        crashUntil = 0,
        gateFlash = 0,
        beat = 0;
      const now = () => performance.now();

      function goTo(id, placeKey, text) {
        const f = figures[id];
        const p = PLACES[placeKey] || PLACES[CAST[id].home];
        const c = CAST[id];
        // stand a little off the building; villagers cluster, don't overlap the icon
        f.tx = p.x + (c.home === placeKey ? c.ox : (Math.random() - 0.5) * 46);
        f.ty = p.y + (c.home === placeKey ? c.oy : 40 + Math.random() * 12);
        f.idleUntil = now() + 6500;
        if (text) {
          f.bubble = text.length > 46 ? text.slice(0, 44) + "…" : text;
          f.bubbleUntil = now() + 6000;
        }
      }

      // ---- render ---------------------------------------------------------------------------
      function palisade() {
        ctx.save();
        ctx.strokeStyle = "#5a4a33";
        ctx.lineWidth = 3;
        ctx.setLineDash([2, 9]);
        ctx.beginPath();
        ctx.moveTo(878, 40);
        ctx.lineTo(878, 268);
        ctx.moveTo(878, 332);
        ctx.lineTo(878, 590);
        ctx.stroke();
        ctx.setLineDash([]);
        // gateposts
        ctx.fillStyle = "#5a4a33";
        ctx.fillRect(872, 262, 12, 12);
        ctx.fillRect(872, 326, 12, 12);
        ctx.restore();
      }

      function barn(x, y) {
        ctx.fillStyle = "#8f4636";
        ctx.fillRect(x - 34, y - 14, 68, 46);
        ctx.beginPath();
        ctx.moveTo(x - 40, y - 14);
        ctx.lineTo(x, y - 40);
        ctx.lineTo(x + 40, y - 14);
        ctx.closePath();
        ctx.fillStyle = "#6f3428";
        ctx.fill();
        ctx.fillStyle = "#e7d7b0";
        ctx.fillRect(x - 9, y + 6, 18, 26);
      }
      function hive(x, y) {
        ctx.fillStyle = "#d8a638";
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.ellipse(x, y - 4 + i * 12, 26 - i * 4, 8, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = "#7a5a15";
        ctx.beginPath();
        ctx.arc(x, y + 24, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      function garden(x, y) {
        ctx.fillStyle = "#5c4327";
        ctx.fillRect(x - 46, y - 20, 92, 44);
        ctx.fillStyle = "#6faa4a";
        for (let r = 0; r < 3; r++)
          for (let cxi = 0; cxi < 6; cxi++) {
            ctx.beginPath();
            ctx.arc(x - 38 + cxi * 15, y - 10 + r * 15, 4, 0, Math.PI * 2);
            ctx.fill();
          }
      }
      function hall(x, y, shake) {
        ctx.save();
        ctx.translate(shake ? (Math.random() - 0.5) * 6 : 0, 0);
        ctx.fillStyle = crashUntil > now() ? "#8f8578" : "#b9b0a0";
        ctx.fillRect(x - 46, y - 30, 92, 60);
        ctx.fillStyle = "#8f887a";
        ctx.beginPath();
        ctx.moveTo(x - 52, y - 30);
        ctx.lineTo(x, y - 52);
        ctx.lineTo(x + 52, y - 30);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#6f6a5e";
        for (let i = 0; i < 4; i++) ctx.fillRect(x - 38 + i * 22, y - 22, 7, 44);
        // vault (a small strongbox)
        ctx.fillStyle = "#4a4438";
        ctx.fillRect(x + 30, y + 18, 26, 20);
        ctx.fillStyle = "#c6b06a";
        ctx.beginPath();
        ctx.arc(x + 43, y + 28, 3, 0, Math.PI * 2);
        ctx.fill();
        // mill wheel
        const wx = x - 60,
          wy = y + 10;
        ctx.strokeStyle = millActive > now() ? "#8a6b1f" : "#7a746a";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(wx, wy, 18, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = 0; i < 6; i++) {
          const a = millSpin + (i * Math.PI) / 3;
          ctx.beginPath();
          ctx.moveTo(wx, wy);
          ctx.lineTo(wx + Math.cos(a) * 18, wy + Math.sin(a) * 18);
          ctx.stroke();
        }
        ctx.restore();
      }
      function hut(x, y) {
        ctx.fillStyle = "#357f7a";
        ctx.fillRect(x - 26, y - 12, 52, 36);
        ctx.fillStyle = "#276460";
        ctx.beginPath();
        ctx.moveTo(x - 30, y - 12);
        ctx.lineTo(x, y - 30);
        ctx.lineTo(x + 30, y - 12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#bfe7e3";
        ctx.fillRect(x - 7, y + 2, 14, 22);
      }

      function building(p, key) {
        if (key === "reel") barn(p.x, p.y);
        else if (key === "hive") hive(p.x, p.y);
        else if (key === "commons") garden(p.x, p.y);
        else if (key === "almanac") hall(p.x, p.y, crashUntil > now());
        else if (key === "cinelog") hut(p.x, p.y);
        if (p.label) {
          ctx.fillStyle = "#22301a";
          ctx.font = "600 12px ui-sans-serif, system-ui";
          ctx.textAlign = "center";
          ctx.fillText(p.label, p.x, p.y + 48);
        }
      }

      function figure(f) {
        const walking = Math.hypot(f.tx - f.x, f.ty - f.y) > 1.5;
        const bob = walking ? Math.sin(f.phase * 6) * 2 : 0;
        // shadow
        ctx.fillStyle = "rgba(20,30,15,0.18)";
        ctx.beginPath();
        ctx.ellipse(f.x, f.y + 16, 9, 3.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // body
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.roundRect(f.x - 6, f.y - 6 + bob, 12, 18, 4);
        ctx.fill();
        // head
        ctx.fillStyle = "#f0e2c4";
        ctx.beginPath();
        ctx.arc(f.x, f.y - 11 + bob, 6, 0, Math.PI * 2);
        ctx.fill();
        // name
        ctx.fillStyle = "#1a2412";
        ctx.font = "600 11px ui-sans-serif, system-ui";
        ctx.textAlign = "center";
        ctx.fillText(NAMES[f.id], f.x, f.y + 27);
        // speech bubble
        if (f.bubble && f.bubbleUntil > now()) {
          ctx.font = "12px ui-sans-serif, system-ui";
          const w = Math.min(210, ctx.measureText(f.bubble).width + 16);
          const bx = f.x,
            by = f.y - 30 + bob;
          ctx.fillStyle = "rgba(248,242,224,0.96)";
          ctx.strokeStyle = "#cdbf9a";
          ctx.beginPath();
          ctx.roundRect(bx - w / 2, by - 20, w, 24, 7);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#2b2318";
          ctx.fillText(f.bubble, bx, by - 3);
        }
      }

      function frame(dt) {
        ctx.clearRect(-ox / scale, -oy / scale, cv.width, cv.height);
        ctx.save();
        ctx.translate(ox, oy);
        ctx.scale(scale, scale);

        palisade();
        // buildings back-to-front by y
        for (const key of ["reel", "hive", "almanac", "cinelog", "commons"]) building(PLACES[key], key);

        // gate flash (a refused crossing)
        if (gateFlash > now()) {
          ctx.strokeStyle = "#c85a3a";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(878, 270);
          ctx.lineTo(878, 330);
          ctx.stroke();
        }

        const order = Object.values(figures).sort((a, b) => a.y - b.y);
        for (const f of order) {
          f.phase += dt / 1000;
          const dx = f.tx - f.x,
            dy = f.ty - f.y,
            d = Math.hypot(dx, dy);
          if (d > 1.5) {
            const sp = Math.min(d, (dt / 1000) * 70);
            f.x += (dx / d) * sp;
            f.y += (dy / d) * sp;
          } else if (now() > f.idleUntil) {
            // drift home
            f.tx = f.hx;
            f.ty = f.hy;
          }
          figure(f);
        }
        ctx.restore();

        if (millActive > now()) millSpin += dt / 700;
      }

      let last = now();
      function loop() {
        const t = now();
        frame(t - last);
        last = t;
        requestAnimationFrame(loop);
      }

      // ---- dossier panel --------------------------------------------------------------------
      const state = {};
      let selected = null;
      const $d = document.getElementById("dossier");
      function chips(list, cls) {
        if (!list || !list.length) return '<span class="chip" style="color:#a99b78">none yet</span>';
        return [...new Set(list)]
          .map((it) => {
            const label =
              it && typeof it === "object"
                ? String(it.film ?? it.value ?? "…").replace(/^film:/, "") +
                  (it.origin ? " ⇠ " + it.origin : "")
                : String(it).replace(/^(screening|gathering|person):/, "");
            return `<span class="chip${cls ? " " + cls : ""}">${escapeHtml(label)}</span>`;
          })
          .join("");
      }
      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }
      function drawDossier() {
        if (!selected || !state[selected]) {
          $d.innerHTML = '<div class="empty">no one selected — click a figure</div>';
          return;
        }
        const s = state[selected];
        const duel = s.trusted !== undefined && s.trusted !== s.bio;
        const erased = s.guarded !== undefined && s.guarded !== s.bio && s.guarded !== s.trusted;
        let h = `<h3>${escapeHtml(s.name || NAMES[selected] || selected)}</h3>`;
        h += `<div class="bio${duel || erased ? " " : ""}">“${escapeHtml(s.bio ?? "—")}”</div>`;
        if (duel)
          h += `<div class="lens">trusted lens: “${escapeHtml(s.trusted)}”</div>`;
        if (erased)
          h += `<div class="lens alarm">guarded record holds: “${escapeHtml(s.guarded)}”</div>`;
        if (s.presence) h += `<div class="mill">🌾 ${escapeHtml(s.presence)}</div>`;
        h += `<div class="row"><div class="k">follows</div>${chips(s.follows)}</div>`;
        h += `<div class="row"><div class="k">screenings</div>${chips(s.companioned, "reel")}</div>`;
        h += `<div class="row"><div class="k">gatherings</div>${chips(s.attended, "hive")}</div>`;
        $d.innerHTML = h;
      }

      cv.addEventListener("click", (e) => {
        const r = cv.getBoundingClientRect();
        const mx = (e.clientX - r.left - ox) / scale;
        const my = (e.clientY - r.top - oy) / scale;
        let hit = null,
          best = 26;
        for (const f of Object.values(figures)) {
          const d = Math.hypot(f.x - mx, f.y - my);
          if (d < best) {
            best = d;
            hit = f.id;
          }
        }
        if (hit) {
          selected = "person:" + hit;
          drawDossier();
        }
      });

      // ---- the event stream (same protocol the dashboard always spoke) ----------------------
      function logLine(kind, text) {
        const log = document.getElementById("log");
        const e = document.createElement("div");
        e.className = "e " + (kind || "");
        e.innerHTML = `<span class="t">${new Date().toLocaleTimeString()}</span>${escapeHtml(text)}`;
        log.prepend(e);
        while (log.children.length > 80) log.lastChild.remove();
      }

      const es = new EventSource("/events");
      es.onmessage = (msg) => {
        let ev;
        try {
          ev = JSON.parse(msg.data);
        } catch {
          return;
        }
        if (ev.kind === "event") {
          logLine(ev.tone, ev.text);
          if (ev.actor && figures[ev.actor]) goTo(ev.actor, ev.place, ev.text);
          const low = ev.text.toLowerCase();
          if (low.includes("disk") || low.includes("crash")) crashUntil = now() + 2600;
          if (low.includes("mill") || low.includes("grind") || low.includes("render"))
            millActive = now() + 9000;
          if (low.includes("bounce") || low.includes("accepted: 0") || low.includes("refuse"))
            gateFlash = now() + 1400;
        } else if (ev.kind === "dossier") {
          state[ev.person] = Object.assign(state[ev.person] ?? {}, ev.data, {
            name: ev.data?.name,
          });
          if (selected === ev.person) drawDossier();
        } else if (ev.kind === "trust") {
          state["person:wren"] = Object.assign(state["person:wren"] ?? {}, {
            bio: ev.plain,
            trusted: ev.trusted,
            guarded: ev.guarded,
          });
          if (selected === "person:wren") drawDossier();
        } else if (ev.kind === "mill") {
          for (const [person, flour] of Object.entries(ev.flour ?? {})) {
            state[person] = Object.assign(state[person] ?? {}, { presence: flour });
          }
          if (selected && state[selected]) drawDossier();
          millActive = now() + 9000;
        } else if (ev.kind === "pulse") {
          const pip = document.getElementById("pip");
          pip.classList.add("beat");
          setTimeout(() => pip.classList.remove("beat"), 180);
        }
      };
      es.onerror = () => {};

      window.addEventListener("resize", fit);
      fit();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
